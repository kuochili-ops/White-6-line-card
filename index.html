<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六賀卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .input-section { display: flex; gap: 8px; margin-bottom: 10px; }
        .left-fields { flex: 2.2; }
        .right-format { flex: 1; background: #f0f9f0; padding: 8px; border-radius: 10px; border: 1px solid #d0e8d0; }
        
        label { font-size: 10px; color: #999; font-weight: bold; margin-bottom: 2px; display: block; }
        input, textarea, select { width: 100%; padding: 6px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 6px; }
        
        /* 預覽容器 */
        .preview-container { margin: 10px 0; border: 2px solid #00b900; border-radius: 15px; overflow: hidden; position: relative; background: #000; line-height: 0; }
        #upload-demo { width: 100%; height: 260px; } /* 編輯模式用 */
        #static-img { width: 100%; display: none; } /* 轉傳模式用 */
        
        .text-overlay {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            pointer-events: none; z-index: 10; text-shadow: 0 1px 4px rgba(255,255,255,0.8); line-height: 1.4;
        }
        #p-brand { font-size: 10px; color: #00b900; font-weight: bold; display: block; }
        #p-name { font-weight: bold; display: block; }
        #p-msg { display: block; }

        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-forward { flex: 2; background-color: #00b900; color: white; padding: 14px; font-size: 16px; }
        .btn-custom { flex: 1; background-color: #f0f0f0; color: #666; padding: 8px; font-size: 12px; }
        
        #status { text-align: center; font-size: 10px; color: #bbb; margin-top: 8px; }
        .mode-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-indicator" class="mode-tag" style="background: #e3f2fd; color: #1976d2;">🆕 全新製作模式</div>

    <div class="input-section">
        <div class="left-fields">
            <label>收件人</label>
            <input type="text" id="targetName" placeholder="收件人姓名" onfocus="setCurrentField('targetName')" oninput="updateUI()">
            <label>祝福語</label>
            <textarea id="message" rows="2" placeholder="祝福內容" onfocus="setCurrentField('message')" oninput="updateUI()"></textarea>
        </div>
        <div class="right-format">
            <label>大小</label>
            <select id="fontSize" onchange="applyFormat()">
                <option value="sm">小</option><option value="md" selected>中</option><option value="lg">大</option><option value="xl">特大</option>
            </select>
            <label>顏色</label>
            <select id="fontColor" onchange="applyFormat()">
                <option value="#333333">黑</option><option value="#00b900">綠</option><option value="#ff4b4b">紅</option><option value="#4b77ff">藍</option>
            </select>
        </div>
    </div>

    <div class="preview-container">
        <div id="upload-demo"></div>
        <img id="static-img" src="">
        
        <div class="text-overlay">
            <span id="p-brand">𓃥 白六賀卡</span>
            <span id="p-name">To: 好友</span>
            <span id="p-msg">祝你有個美好的一天！</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-forward" onclick="sendGreeting()">🚀 快速轉傳</button>
        <button id="btn-new" class="btn btn-custom" onclick="location.href=location.pathname">重新製作</button>
    </div>
    <div id="status">𓃥 載入中...</div>
</div>

<script>
    const LIFF_ID = '2009222789-kAJm4sds';
    const CLOUD_NAME = 'dnwwaush7';
    const UPLOAD_PRESET = 'ml_default';
    
    let croppieInstance;
    let isForwardMode = false;
    let currentFocus = 'targetName';
    let currentImageUrl = 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg';
    let formats = { targetName: { size: 'xl', color: '#333333' }, message: { size: 'md', color: '#333333' } };

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();

            const params = new URLSearchParams(window.location.search);
            if (params.has('img')) {
                // 進入轉傳模式：鎖定照片
                isForwardMode = true;
                currentImageUrl = params.get('img');
                document.getElementById('targetName').value = params.get('to') || '';
                document.getElementById('message').value = params.get('msg') || '';
                
                // UI 調整
                document.getElementById('mode-indicator').innerText = "🔗 快速轉傳模式 (照片已鎖定)";
                document.getElementById('mode-indicator').style.background = "#fff3e0";
                document.getElementById('mode-indicator').style.color = "#ef6c00";
                document.getElementById('upload-demo').style.display = 'none';
                const sImg = document.getElementById('static-img');
                sImg.style.display = 'block';
                sImg.src = currentImageUrl;
                document.getElementById('status').innerText = "𓃥 您可以修改文字後直接轉傳";
            } else {
                // 編輯模式
                croppieInstance = new Croppie(document.getElementById('upload-demo'), {
                    viewport: { width: 300, height: 195, type: 'square' },
                    boundary: { width: '100%', height: 260 }
                });
                croppieInstance.bind({ url: currentImageUrl });
                document.getElementById('status').innerText = "𓃥 請上傳或調整照片";
                // 增加上傳提示
                const hint = document.createElement('div');
                hint.className = 'status';
                hint.innerHTML = '<input type="file" id="f" hidden onchange="readF(this)"><span onclick="document.getElementById(\'f\').click()" style="color:#00b900;cursor:pointer;text-decoration:underline">📷 點此上傳新照片</span>';
                document.body.appendChild(hint);
            }
            updateUI();
        } catch (e) { alert(e); }
    }

    function readF(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => croppieInstance.bind({ url: e.target.result });
            reader.readAsDataURL(input.files[0]);
        }
    }

    function setCurrentField(f) {
        currentFocus = f;
        document.getElementById('fontSize').value = formats[f].size;
        document.getElementById('fontColor').value = formats[f].color;
    }

    function applyFormat() {
        formats[currentFocus].size = document.getElementById('fontSize').value;
        formats[currentFocus].color = document.getElementById('fontColor').value;
        updateUI();
    }

    function updateUI() {
        const pN = document.getElementById('p-name');
        const pM = document.getElementById('p-msg');
        pN.innerText = "To: " + (document.getElementById('targetName').value || '好友');
        pN.style.color = formats.targetName.color;
        pN.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[formats.targetName.size];
        pM.innerText = document.getElementById('message').value || '祝你有個美好的一天！';
        pM.style.color = formats.message.color;
        pM.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[formats.message.size];
    }

    async function sendGreeting() {
        document.getElementById('status').innerText = "準備傳送中...";
        let finalImg = currentImageUrl;

        // 如果是全新製作模式，才需要裁切並上傳
        if (!isForwardMode) {
            try {
                const blob = await croppieInstance.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
                const fd = new FormData();
                fd.append('file', blob);
                fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                finalImg = data.secure_url;
            } catch (e) { alert("圖片處理失敗"); return; }
        }

        const to = document.getElementById('targetName').value || '好友';
        const msg = document.getElementById('message').value || '祝你有個美好的一天！';
        const forwardUrl = `https://liff.line.me/${LIFF_ID}?img=${encodeURIComponent(finalImg)}&to=${encodeURIComponent(to)}&msg=${encodeURIComponent(msg)}`;

        liff.shareTargetPicker([{
            "type": "flex",
            "altText": "𓃥 收到一份來自白六的賀卡！",
            "contents": {
                "type": "bubble",
                "hero": { "type": "image", "url": finalImg, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                        { "type": "text", "text": "To: " + to, "weight": "bold", "size": formats.targetName.size, "color": formats.targetName.color, "margin": "sm" },
                        { "type": "text", "text": msg, "wrap": true, "margin": "lg", "size": formats.message.size, "color": formats.message.color }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "我也要轉傳/製作", "uri": forwardUrl } }
                    ]
                }
            }
        }]).then(() => liff.closeWindow());
    }

    init();
</script>

</body>
</html>
