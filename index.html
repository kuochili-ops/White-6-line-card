<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六賀卡製作</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { color: #00b900; text-align: center; font-size: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #666; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fdfdfd; }
        
        .upload-area { border: 1px dashed #00b900; padding: 15px; border-radius: 10px; text-align: center; background: #f9fff9; margin-bottom: 15px; }
        .upload-btn { font-size: 14px; color: #00b900; cursor: pointer; font-weight: bold; }
        #uploadStatus { font-size: 11px; color: #888; margin-top: 5px; }

        .preview-card { margin: 15px 0; border: 2px solid #00b900; border-radius: 15px; overflow: hidden; background: #fff; }
        .preview-img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .preview-content { padding: 15px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background-color: #00b900; color: white; margin-bottom: 10px; }
        .btn-main:disabled { background-color: #ccc; }
        #loading-mask { text-align: center; color: #999; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>𓃥 白六賀卡製作</h2>
    
    <div class="field">
        <label>收件人姓名</label>
        <input type="text" id="targetName" placeholder="輸入好友暱稱..." oninput="updateUI()">
    </div>

    <div class="field">
        <label>祝福語</label>
        <textarea id="message" rows="2" placeholder="想對他說什麼？" oninput="updateUI()"></textarea>
    </div>

    <div class="field">
        <label>更換背景照片</label>
        <div class="upload-area">
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadToCloudinary(this)">
            <div class="upload-btn" onclick="document.getElementById('imageInput').click()">📷 點此開啟相簿並上傳</div>
            <div id="uploadStatus">目前使用預設圖片</div>
        </div>
    </div>

    <div class="preview-card">
        <img id="previewImg" class="preview-img" src="https://res.cloudinary.com/dnwwaush7/image/upload/f_auto,q_auto,w_800/v1774012083/cdegpgigtlzghqnjoadb.jpg">
        <div class="preview-content">
            <div id="ui-name" style="font-weight: bold; font-size: 18px;">To: 好友</div>
            <div id="ui-msg" style="color: #555; margin-top: 5px;">祝你有個美好的一天！</div>
        </div>
    </div>

    <button id="sendBtn" class="btn btn-main" onclick="sendGreeting()">分享賀卡給好友</button>
    <div id="loading-mask">系統準備中...</div>
</div>

<script>
    const LIFF_ID = '2009222789-kAJm4sds'; 
    const CLOUD_NAME = 'dnwwaush7'; 
    const UPLOAD_PRESET = 'ml_default'; 
    
    let currentImageUrl = "https://res.cloudinary.com/dnwwaush7/image/upload/f_auto,q_auto,w_800/v1774012083/cdegpgigtlzghqnjoadb.jpg";

    async function initLIFF() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            else document.getElementById('loading-mask').innerText = "𓃥 已連線";
        } catch (err) { alert("初始化失敗: " + err.message); }
    }

    async function uploadToCloudinary(input) {
        if (!input.files || !input.files[0]) return;
        
        const file = input.files[0];
        const status = document.getElementById('uploadStatus');
        const btn = document.getElementById('sendBtn');
        
        status.innerText = "正在上傳照片...";
        status.style.color = "#f39c12";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (data.secure_url) {
                // 自動套用 Cloudinary 的最佳化參數
                currentImageUrl = data.secure_url.replace('/upload/', '/upload/f_auto,q_auto,w_800/');
                document.getElementById('previewImg').src = currentImageUrl;
                status.innerText = "✅ 上傳成功！";
                status.style.color = "#00b900";
            } else {
                throw new Error("Upload Error");
            }
        } catch (err) {
            alert("上傳失敗，請確認 Cloudinary 的 Upload Preset 是否設定為 Unsigned 模式。");
            status.innerText = "❌ 上傳失敗";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }

    function updateUI() {
        const name = document.getElementById('targetName').value || '好友';
        const msg = document.getElementById('message').value || '祝你有個美好的一天！';
        document.getElementById('ui-name').innerText = "To: " + name;
        document.getElementById('ui-msg').innerText = msg;
    }

    async function sendGreeting() {
        const name = document.getElementById('targetName').value || '好友';
        const msg = document.getElementById('message').value || '祝你有個美好的一天！';

        try {
            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "您收到一份驚喜賀卡！",
                "contents": {
                    "type": "bubble",
                    "hero": {
                        "type": "image",
                        "url": currentImageUrl,
                        "size": "full",
                        "aspectRatio": "20:13",
                        "aspectMode": "cover"
                    },
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                            { "type": "text", "text": "To: " + name, "weight": "bold", "size": "xl", "margin": "md" },
                            { "type": "text", "text": msg, "wrap": true, "margin": "lg", "color": "#444444" }
                        ]
                    },
                    "footer": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            {
                                "type": "button",
                                "style": "primary",
                                "color": "#00b900",
                                "action": {
                                    "type": "uri",
                                    "label": "我也要製作",
                                    "uri": "https://liff.line.me/" + LIFF_ID
                                }
                            }
                        ]
                    }
                }
            }]);
            liff.closeWindow();
        } catch (error) {
            alert("分享失敗：" + error.message);
        }
    }

    initLIFF();
</script>

</body>
</html>
