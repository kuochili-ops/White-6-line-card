<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六影片傳送器</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --yt-red: #ff0000; --dark: #1a1a1a; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #f4f7f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 420px; }
        h2 { color: var(--line-green); text-align: center; margin: 0 0 20px 0; font-size: 22px; letter-spacing: 1px; }
        
        .tab-group { display: flex; background: #f0f0f0; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 14px; transition: 0.3s; color: #777; font-weight: 500; }
        .tab.active-mp4 { background: var(--line-green); color: white; box-shadow: 0 4px 10px rgba(0,185,0,0.2); }
        .tab.active-yt { background: var(--yt-red); color: white; box-shadow: 0 4px 10px rgba(255,0,0,0.2); }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px 15px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--line-green); outline: none; background: #fff; }
        
        .preview-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 15px; margin: 20px 0; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        #mp4View, #ytView { width: 100%; height: 100%; display: none; border: none; }
        #danmakuLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; overflow: hidden; }
        .danmaku { position: absolute; color: white; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); white-space: nowrap; font-size: 18px; will-change: transform; }

        .btn-send { 
            width: 100%; padding: 18px; background: var(--line-green); color: white; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-send:active { transform: scale(0.97); opacity: 0.9; }
        .footer-text { text-align: center; font-size: 11px; color: #bbb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六影片傳送器</h2>

    <div class="tab-group">
        <div id="tabMp4" class="tab active-mp4" onclick="setMode('mp4')">MP4 直連</div>
        <div id="tabYt" class="tab" onclick="setMode('yt')">YouTube</div>
    </div>

    <div class="field">
        <label id="inputLabel">影片網址 (.mp4)</label>
        <input type="text" id="urlInput" placeholder="貼上網址..." oninput="updatePreview()">
    </div>

    <div id="previewImageField" class="field">
        <label>預覽圖網址 (JPG/PNG)</label>
        <input type="text" id="imgInput" placeholder="https://..." oninput="updatePreview()">
    </div>

    <div class="field">
        <label>彈幕留言 (逗號分隔)</label>
        <input type="text" id="danmakuInput" value="水喔！, 𓃥 白六作品, 質感好棒, 🎥🎥🎥, 66666">
    </div>

    <div class="preview-container">
        <video id="mp4View" controls muted loop playsinline></video>
        <iframe id="ytView" allow="autoplay; encrypted-media"></iframe>
        <div id="danmakuLayer"></div>
    </div>

    <button class="btn-send" onclick="doSend()">發送至聊天室</button>
    <div class="footer-text">Powered by White 6 LIFF Editor</div>
</div>

<script>
    let mode = 'mp4';
    const MY_LIFF_ID = "2009222789-ouCqL9JS"; // 已為您填入

    async function init() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (e) {
            console.error("LIFF 初始化失敗", e);
        }
    }

    function setMode(newMode) {
        mode = newMode;
        const tMp4 = document.getElementById('tabMp4');
        const tYt = document.getElementById('tabYt');
        const imgField = document.getElementById('previewImageField');
        const label = document.getElementById('inputLabel');

        if (mode === 'mp4') {
            tMp4.className = 'tab active-mp4';
            tYt.className = 'tab';
            label.innerText = "影片網址 (.mp4)";
            imgField.style.display = 'block';
        } else {
            tMp4.className = 'tab';
            tYt.className = 'tab active-yt';
            label.innerText = "YouTube 影片 ID";
            imgField.style.display = 'none';
        }
        updatePreview();
    }

    function updatePreview() {
        const val = document.getElementById('urlInput').value.trim();
        const vMp4 = document.getElementById('mp4View');
        const vYt = document.getElementById('ytView');

        if (mode === 'mp4') {
            vYt.style.display = 'none';
            vYt.src = "";
            vMp4.style.display = 'block';
            if (val.toLowerCase().includes('.mp4')) {
                vMp4.src = val;
                vMp4.play().catch(() => {});
            }
        } else {
            vMp4.style.display = 'none';
            vMp4.src = "";
            vYt.style.display = 'block';
            if (val.length >= 10) {
                vYt.src = `https://www.youtube.com/embed/${val}?autoplay=1&mute=1&enablejsapi=1`;
            }
        }
    }

    function createDanmaku() {
        const input = document.getElementById('danmakuInput').value;
        if (!input) return;
        const texts = input.split(',');
        const layer = document.getElementById('danmakuLayer');
        const el = document.createElement('div');
        el.className = 'danmaku';
        el.innerText = texts[Math.floor(Math.random() * texts.length)].trim();
        el.style.top = (Math.random() * 70 + 5) + '%';
        el.style.left = '100%';
        layer.appendChild(el);

        const duration = 4000 + Math.random() * 2000;
        const anim = el.animate([
            { transform: 'translateX(0)' },
            { transform: `translateX(-${layer.offsetWidth + 600}px)` }
        ], { duration: duration, easing: 'linear' });

        anim.onfinish = () => el.remove();
    }

    setInterval(createDanmaku, 1800);

    async function doSend() {
        const url = document.getElementById('urlInput').value.trim();
        const img = document.getElementById('imgInput').value.trim();

        if (!liff.isInClient()) {
            alert("請在 LINE 手機版內點開此連結測試");
            return;
        }

        let message = [];
        if (mode === 'mp4') {
            if(!url || !img) { alert("請填寫影片與預覽圖網址"); return; }
            message = [{ type: "video", originalContentUrl: url, previewImageUrl: img }];
        } else {
            if(!url) { alert("請填寫 YouTube ID"); return; }
            message = [{
                type: "flex",
                altText: "分享了 YouTube 影片",
                contents: {
                    "type": "bubble",
                    "hero": {
                        "type": "image",
                        "url": `https://img.youtube.com/vi/${url}/maxresdefault.jpg`,
                        "size": "full", "aspectRatio": "16:9", "aspectMode": "cover",
                        "action": { "type": "uri", "uri": `https://liff.line.me/${MY_LIFF_ID}?v=${url}` }
                    },
                    "body": { "type": "box", "layout": "vertical", "contents": [{"type": "text", "text": "🎥 點擊下方播放影片", "size": "sm", "color": "#888888"}] },
                    "footer": {
                        "type": "box", "layout": "vertical", "contents": [
                            { "type": "button", "style": "primary", "color": "#ff0000", "action": { "type": "uri", "label": "開啟播放器", "uri": `https://liff.line.me/${MY_LIFF_ID}?v=${url}` } }
                        ]
                    }
                }
            }];
        }

        try {
            await liff.sendMessages(message);
            liff.closeWindow();
        } catch (err) {
            alert("發送失敗！請至 LINE Developers 確認是否有開啟 'chat_message.write' 權限。\n\n錯誤訊息：" + err.message);
        }
    }

    window.onload = init;
</script>

</body>
</html>
