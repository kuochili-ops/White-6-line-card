<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六賀卡製作</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; padding: 15px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { color: #00b900; text-align: center; font-size: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #666; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fdfdfd; }
        
        /* 格式控制列 */
        .format-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .format-row > div { flex: 1; }

        .preview-card { margin: 15px 0; border: 2px solid #00b900; border-radius: 15px; overflow: hidden; background: #fff; }
        .preview-img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .preview-content { padding: 15px; min-height: 80px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background-color: #00b900; color: white; margin-bottom: 8px; }
        .btn-sub { background-color: #f0f0f0; color: #666; font-size: 13px; }
        #loading-mask { text-align: center; color: #999; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>𓃥 白六賀卡製作</h2>
    
    <div class="field">
        <label>收件人姓名</label>
        <input type="text" id="targetName" placeholder="輸入好友暱稱..." oninput="updateUI()">
    </div>

    <div class="field">
        <label>祝福內容</label>
        <textarea id="message" rows="2" placeholder="想對他說什麼？" oninput="updateUI()"></textarea>
    </div>

    <div class="format-row">
        <div>
            <label>文字大小</label>
            <select id="fontSize" onchange="updateUI()">
                <option value="sm">小 (sm)</option>
                <option value="md" selected>中 (md)</option>
                <option value="lg">大 (lg)</option>
                <option value="xl">特大 (xl)</option>
            </select>
        </div>
        <div>
            <label>文字顏色</label>
            <select id="fontColor" onchange="updateUI()">
                <option value="#333333">深黑</option>
                <option value="#00b900">LINE綠</option>
                <option value="#ff4b4b">熱情紅</option>
                <option value="#4b77ff">冷靜藍</option>
                <option value="#f39c12">溫暖橘</option>
            </select>
        </div>
    </div>

    <div class="preview-card">
        <img class="preview-img" src="https://res.cloudinary.com/dnwwaush7/image/upload/f_auto,q_auto,w_800/v1774012083/cdegpgigtlzghqnjoadb.jpg">
        <div class="preview-content">
            <div id="ui-name" style="font-weight: bold; font-size: 18px;">To: 好友</div>
            <div id="ui-msg" style="margin-top: 5px;">祝你有個美好的一天！</div>
        </div>
    </div>

    <button class="btn btn-main" onclick="sendGreeting()">傳送客製化賀卡</button>
    <button class="btn btn-sub" onclick="shareApp()">分享此工具</button>
    
    <div id="loading-mask">系統準備中...</div>
</div>

<script>
    const LIFF_ID = '2009222789-kAJm4sds'; 
    const CARD_IMAGE = "https://res.cloudinary.com/dnwwaush7/image/upload/f_auto,q_auto,w_800/v1774012083/cdegpgigtlzghqnjoadb.jpg";

    async function initLIFF() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            else document.getElementById('loading-mask').innerText = "𓃥 已連線";
        } catch (err) { alert("初始化失敗: " + err.message); }
    }

    function updateUI() {
        const name = document.getElementById('targetName').value || '好友';
        const msg = document.getElementById('message').value || '祝你有個美好的一天！';
        const size = document.getElementById('fontSize').value;
        const color = document.getElementById('fontColor').value;

        // 更新網頁預覽
        const nameDisplay = document.getElementById('ui-name');
        const msgDisplay = document.getElementById('ui-msg');
        
        nameDisplay.innerText = "To: " + name;
        msgDisplay.innerText = msg;
        msgDisplay.style.color = color;
        
        // 對應 HTML 預覽的大小
        const sizeMap = { 'sm': '13px', 'md': '15px', 'lg': '18px', 'xl': '22px' };
        msgDisplay.style.fontSize = sizeMap[size];
    }

    async function sendGreeting() {
        const name = document.getElementById('targetName').value || '好友';
        const msg = document.getElementById('message').value || '祝你有個美好的一天！';
        const size = document.getElementById('fontSize').value;
        const color = document.getElementById('fontColor').value;

        try {
            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "您收到一份專屬賀卡！",
                "contents": {
                    "type": "bubble",
                    "hero": {
                        "type": "image",
                        "url": CARD_IMAGE,
                        "size": "full",
                        "aspectRatio": "20:13",
                        "aspectMode": "cover"
                    },
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                            { "type": "text", "text": "To: " + name, "weight": "bold", "size": "xl", "margin": "md" },
                            { 
                                "type": "text", 
                                "text": msg, 
                                "wrap": true, 
                                "margin": "lg", 
                                "color": color, // 動態顏色
                                "size": size    // 動態大小
                            }
                        ]
                    },
                    "footer": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            {
                                "type": "button",
                                "style": "primary",
                                "color": "#00b900",
                                "action": {
                                    "type": "uri",
                                    "label": "我也要製作",
                                    "uri": "https://liff.line.me/" + LIFF_ID
                                }
                            }
                        ]
                    }
                }
            }]);
            liff.closeWindow();
        } catch (error) {
            alert("失敗：" + error.message);
        }
    }

    async function shareApp() {
        try {
            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "分享一個好用的賀卡製作器！",
                "contents": {
                    "type": "bubble",
                    "body": {
                        "type": "box", "layout": "vertical", "contents": [
                            { "type": "text", "text": "𓃥 白六賀卡製作器", "weight": "bold", "size": "lg" },
                            { "type": "text", "text": "支援客製化文字格式，快來試試！", "wrap": true, "size": "sm", "margin": "sm" }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical", "contents": [
                            { "type": "button", "style": "link", "action": { "type": "uri", "label": "立即開啟", "uri": "https://liff.line.me/" + LIFF_ID } }
                        ]
                    }
                }
            }]);
        } catch (e) { alert("分享失敗：" + e.message); }
    }

    initLIFF();
</script>

</body>
</html>
