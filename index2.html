<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六賀卡 Carousel</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* 緊湊欄位配置 */
        .input-section { display: flex; gap: 8px; margin-bottom: 10px; }
        .left-fields { flex: 2; }
        .right-format { flex: 1.2; background: #f0f9f0; padding: 8px; border-radius: 10px; border: 1px solid #d0e8d0; }
        label { font-size: 10px; color: #999; font-weight: bold; margin-bottom: 2px; display: block; }
        input, textarea, select { width: 100%; padding: 6px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 6px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #00b900; background: #fff; outline: none; }
        
        /* 編輯與裁切區 */
        .preview-container { margin: 10px 0; border: 2px solid #00b900; border-radius: 15px; overflow: hidden; position: relative; background: #000; line-height: 0; }
        #upload-demo { width: 100%; height: 260px; } /* 編輯模式用 */
        #static-img { width: 100%; height: 260px; object-fit: cover; display: none; } /* 轉傳模式用 */
        
        .text-overlay { position: absolute; bottom: 30px; left: 15px; right: 15px; pointer-events: none; z-index: 10; text-shadow: 0 1px 4px rgba(255,255,255,0.8); line-height: 1.4; }
        #p-brand { font-size: 10px; color: #00b900; font-weight: bold; display: block; }
        #p-name, #p-msg { display: block; }

        /* Carousel 管理區 */
        .carousel-manager { background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #eee; margin-top: 10px; display: none; }
        .thumb-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-item { width: 60px; height: 40px; border-radius: 5px; border: 2px solid transparent; object-fit: cover; cursor: pointer; flex-shrink: 0; opacity: 0.6; }
        .thumb-item.active { border-color: #00b900; opacity: 1; }
        .thumb-add { width: 60px; height: 40px; border-radius: 5px; border: 2px dashed #ccc; background: #fff; display: flex; align-items: center; justify-content: center; color: #999; font-size: 20px; cursor: pointer; flex-shrink: 0; }

        /* 底部按鈕 */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 100; text-align: center; }
        .btn-main { width: 100%; max-width: 400px; background-color: #00b900; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background-color: #ccc; }
        
        #status { text-align: center; font-size: 10px; color: #bbb; margin-top: 10px; }
        .mode-hint { font-size: 11px; font-weight: bold; margin-bottom: 8px; text-align: center; padding: 4px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-hint" class="mode-hint"></div>

    <div class="input-section">
        <div class="left-fields">
            <label>收件人</label>
            <input type="text" id="targetName" placeholder="姓名" onfocus="setCurrentField('targetName')" oninput="updateCurrentCardData()">
            <label>祝福語</label>
            <textarea id="message" rows="2" placeholder="內容" onfocus="setCurrentField('message')" oninput="updateCurrentCardData()"></textarea>
        </div>
        <div class="right-format">
            <label>大小</label>
            <select id="fontSize" onchange="applyFormatToCurrentCard()">
                <option value="sm">小</option><option value="md">中</option><option value="lg">大</option><option value="xl">特大</option>
            </select>
            <label>顏色</label>
            <select id="fontColor" onchange="applyFormatToCurrentCard()">
                <option value="#333333">黑</option><option value="#00b900">綠</option><option value="#ff4b4b">紅</option><option value="#4b77ff">藍</option>
            </select>
        </div>
    </div>

    <div class="preview-container">
        <div id="upload-demo"></div>
        <img id="static-img" src="">
        <div class="text-overlay">
            <span id="p-brand">𓃥 白六賀卡</span>
            <span id="p-name">To: 好友</span>
            <span id="p-msg">祝你有個美好的一天！</span>
        </div>
    </div>

    <div id="carousel-manager" class="carousel-manager">
        <label>多卡片組合 (最多10張)</label>
        <div id="thumb-list" class="thumb-list">
            <div class="thumb-add" onclick="addNewCard()"><input type="file" id="f" hidden accept="image/*" onchange="readF(this)">+</div>
        </div>
        <div style="font-size: 10px; color: #888; margin-top: 5px;">* 編輯模式下，每次傳送只需一張張上傳照片。確定後點擊下方傳送即可一次全部上傳傳送。轉傳模式照片已固定。</div>
    </div>

    <div id="status">𓃥 初始化中...</div>
</div>

<div class="footer-bar">
    <button id="sendBtn" class="btn-main" onclick="executeBatchSend()">🚀 批次處理並傳送</button>
</div>

<script>
    const LIFF_ID = '2009222789-kAJm4sds';
    const CLOUD_NAME = 'dnwwaush7';
    const UPLOAD_PRESET = 'ml_default';
    
    let croppieInstance;
    let isForwardMode = false;
    let currentFocus = 'targetName';
    
    // Carousel 核心數據結構：儲存多張卡片的狀態
    let cardSet = []; 
    let activeCardIndex = 0; // 當前正在編輯的卡片索引

    const defaultImg = 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg';

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            const params = new URLSearchParams(window.location.search);
            const hintBox = document.getElementById('mode-hint');

            if (params.has('img')) {
                // --- B 轉傳模式：鎖定 Carousel 一套圖 ---
                isForwardMode = true;
                hintBox.innerText = "🔗 快速轉傳 (一套 Carousel 照片已鎖定)";
                hintBox.style.background = "#fff3e0"; hintBox.style.color = "#ef6c00";
                document.getElementById('upload-demo').style.display = 'none';
                document.getElementById('static-img').style.display = 'block';
                document.getElementById('carousel-manager').style.display = 'block';

                // 從參數還原數據 (需要解碼長連結)
                还原Carousel数据(params);
                buildThumbList();
                loadCardData(0); // 載入第一張卡片數據
            } else {
                // --- A 製作模式：自由批次製作 ---
                hintBox.innerText = "🆕 全新製作模式 (Carousel 多卡組合)";
                hintBox.style.background = "#e3f2fd"; hintBox.style.color = "#1976d2";
                document.getElementById('carousel-manager').style.display = 'block';
                
                // 初始化 Croppie (編輯用)
                croppieInstance = new Croppie(document.getElementById('upload-demo'), {
                    viewport: { width: 300, height: 195, type: 'square' },
                    boundary: { width: '100%', height: 260 },
                    mouseWheelZoom: false
                });

                // 初始化一張預設卡片
                addNewCardData(defaultImg);
                buildThumbList();
                loadCardData(0); // 載入第一張卡片數據
            }
            document.getElementById('status').innerText = "𓃥 準備就緒";
        } catch (e) { alert(e); }
    }

    // 新增卡片數據模型
    function addNewCardData(imgUrl, blob = null, resultUrl = null) {
        if (cardSet.length >= 10) { alert("最多只能製作 10 張卡片"); return; }
        const newCard = {
            id: Date.now(),
            to: (document.getElementById('targetName').value || ''), // 繼承目前輸入內容
            msg: (document.getElementById('message').value || ''),   // 繼承目前輸入內容
            ts: 'xl', tc: '#333333',
            ms: 'md', mc: '#333333',
            // --- 圖片狀態 ---
            originalImg: imgUrl,      // 原始圖 URL 或 DataURL
            croppedBlob: blob,        // 前端裁切後的 Blob (瘦身用)
            resultUrl: resultUrl,     // Cloudinary 上傳後的 URL (轉傳模式用)
            // Croppie 裁切狀態 (只有編輯模式需要，複雜代碼省略，簡單用 originalImg 演示)
        };
        cardSet.push(newCard);
        activeCardIndex = cardSet.length - 1;
    }

    // 動態生成縮圖列表
    function buildThumbList() {
        const list = document.getElementById('thumb-list');
        // 清除舊縮圖，保留 Add 鈕
        const items = list.querySelectorAll('.thumb-item');
        items.forEach(el => el.remove());

        cardSet.forEach((card, index) => {
            const img = document.createElement('img');
            img.className = `thumb-item ${index === activeCardIndex ? 'active' : ''}`;
            img.src = card.resultUrl || card.originalImg; // 優先顯示 Cloudinary URL
            img.onclick = () => switchToCard(index);
            list.insertBefore(img, document.querySelector('.thumb-add'));
        });
        
        // 隱藏 Add 按鈕，如果是轉傳模式
        document.querySelector('.thumb-add').style.display = isForwardMode ? 'none' : 'flex';
    }

    // 切換卡片
    async function switchToCard(index) {
        if (index === activeCardIndex) return;
        
        // 1. 儲存當前卡片的裁切 blob (重要！)
        if (!isForwardMode && croppieInstance) {
            try {
                // 批次製作核心：在記憶體中裁切瘦身 (800px JPEG)
                const blob = await croppieInstance.result({ type: 'blob', size: { width: 800 }, format: 'jpeg', quality: 0.8 });
                cardSet[activeCardIndex].croppedBlob = blob;
                // 更新縮圖 (用 Blob DataURL，簡單演示省略)
            } catch (e) {}
        }

        // 2. 切換索引並載入新數據
        activeCardIndex = index;
        buildThumbList();
        loadCardData(index);
    }

    // 載入卡片數據到輸入框與預覽
    function loadCardData(index) {
        const card = cardSet[index];
        // 載入文字與格式數據
        document.getElementById('targetName').value = card.to;
        document.getElementById('message').value = card.msg;
        formats = { targetName: { size: card.ts, color: card.tc }, message: { size: card.ms, color: card.mc } };
        
        // 更新文字顏色選單顯示
        setCurrentField('targetName'); 
        updateUI(); // 更新疊加文字預覽

        // 載入圖片到裁切器或靜態圖
        if (isForwardMode) {
            document.getElementById('static-img').src = card.resultUrl;
        } else {
            croppieInstance.bind({ url: card.originalImg });
        }
    }

    // --- 編輯功能同步更新核心數據 ---
    function updateCurrentCardData() {
        if (!cardSet[activeCardIndex]) return;
        cardSet[activeCardIndex].to = document.getElementById('targetName').value;
        cardSet[activeCardIndex].msg = document.getElementById('message').value;
        updateUI(); // 更新疊加預覽
    }
    function applyFormatToCurrentCard() {
        applyFormat(); // 原本的 applyFormat 函數
        cardSet[activeCardIndex].ts = formats.targetName.size;
        cardSet[activeCardIndex].tc = formats.targetName.color;
        cardSet[activeCardIndex].ms = formats.message.size;
        cardSet[activeCardIndex].mc = formats.message.color;
    }

    // --- Carousel 編輯模式：新增卡片並上傳照片 ---
    function addNewCard() {
        document.getElementById('f').click(); // 觸發隱藏的 file input
    }
    // file input 變更
    function readF(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                // 1. 先新增數據
                addNewCardData(e.target.result); 
                // 2. 更新縮圖列表
                buildThumbList();
                // 3. 切換過去並載入 Croppie
                switchToCard(cardSet.length - 1);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- Carousel 製作模式：批次上傳與傳送 ---
    async function executeBatchSend() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        document.getElementById('status').innerText = "開始批次上傳 Cloudinary... 請稍候";
        
        try {
            // 1. 儲存最後一張卡片的裁切 blob
            if (!isForwardMode && croppieInstance) {
                const blob = await croppieInstance.result({ type: 'blob', size: { width: 800 }, format: 'jpeg', quality: 0.8 });
                cardSet[activeCardIndex].croppedBlob = blob;
            }

            // 2. 批次處理所有需要上傳的 Blob (Promise.all)
            if (!isForwardMode) {
                const uploadPromises = cardSet.map(async (card, index) => {
                    if (card.croppedBlob) {
                        const fd = new FormData();
                        fd.append('file', card.croppedBlob);
                        fd.append('upload_preset', UPLOAD_PRESET);
                        fd.append('folder', `white6_carousel/${LIFF_ID}`); // 增加 Cloudinary 資料夾管理
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                        const data = await res.json();
                        if (data.secure_url) {
                            card.resultUrl = data.secure_url; // 儲存 Cloudinary URL
                            return;
                        }
                    }
                    throw new Error(`卡片 ${index+1} 圖片處理失敗`);
                });
                await Promise.all(uploadPromises); // 等待所有上傳完成
            }

            // 3. 取得所有最終圖片 URL 後，進行 Flex Message 發送
            sendCarouselFlex();
        } catch (e) { alert(e.message); btn.disabled = false; }
    }

    // 分離轉傳數據還原邏輯 (複雜參數演示，簡單用 JSON 演示)
    function 还原Carousel数据(params) {
        // 演示用：將所有數據打包成 JSON 塞入 params 演示。實際參數需要精細編碼。
        if (params.has('carousel_json')) {
            try {
                cardSet = JSON.parse(decodeURIComponent(params.get('carousel_json')));
            } catch (e) { cardSet = []; }
        }
    }

    // 建立包含所有 Carousel 數據的轉傳網址 (演示用 JSON，實際應編碼參數)
    function buildCarouselForwardParams(cardSet) {
        // 演示用 JSON。實際參數需要編碼 ts, tc, ms, mc 等。
        const carouselJSON = JSON.stringify(cardSet);
        return `?img=carousel&carousel_json=${encodeURIComponent(carouselJSON)}`;
    }

    // 發送 Carousel Flex Message
    async function sendCarouselFlex() {
        const baseUrl = `https://liff.line.me/${LIFF_ID}`;
        
        // 封裝所有 Carousel 參數到轉傳網址
        const carouselParams = buildCarouselForwardParams(cardSet);
        const forwardUrl = baseUrl + carouselParams; // 快速轉傳
        const resetUrl = baseUrl; // 重新製作

        // 批次製作 Flex Message 的 Bubble 組
        const bubbles = cardSet.map(card => {
            return {
                "type": "bubble",
                "hero": { "type": "image", "url": card.resultUrl, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                        { "type": "text", "text": "To: " + (card.to || '好友'), "weight": "bold", "size": card.ts, "color": card.tc, "margin": "sm" },
                        { "type": "text", "text": (card.msg || '祝你有個美好的一天！'), "wrap": true, "margin": "lg", "size": card.ms, "color": card.mc }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "height": "sm", "action": { "type": "uri", "label": "快速轉傳", "uri": forwardUrl } },
                        { "type": "button", "style": "secondary", "color": "#eeeeee", "height": "sm", "action": { "type": "uri", "label": "重新製作", "uri": resetUrl } }
                    ]
                }
            };
        });

        const carouselFlex = {
            "type": "carousel",
            "contents": bubbles
        };

        liff.shareTargetPicker([{
            "type": "flex",
            "altText": `𓃥 您收到一份白六 Carousel 賀卡組合 (共 ${cardSet.length} 張)！`,
            "contents": carouselFlex
        }]).then(() => liff.closeWindow()).catch(() => { document.getElementById('sendBtn').disabled = false; });
    }

    // --- 原本的 UI 功能片段 ---
    let formats = { targetName: { size: 'xl', color: '#333333' }, message: { size: 'md', color: '#333333' } };
    function applyFormat() {
        formats[currentFocus].size = document.getElementById('fontSize').value;
        formats[currentFocus].color = document.getElementById('fontColor').value;
        updateUI();
    }
    function updateUI() {
        const pN = document.getElementById('p-name');
        const pM = document.getElementById('p-msg');
        pN.innerText = "To: " + (document.getElementById('targetName').value || '好友');
        pN.style.color = formats.targetName.color;
        pN.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[formats.targetName.size];
        pM.innerText = document.getElementById('message').value || '祝你有個美好的一天！';
        pM.style.color = formats.message.color;
        pM.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[formats.message.size];
    }

    init();
</script>

</body>
</html>
