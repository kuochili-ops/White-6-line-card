<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六賀卡·超</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f8f9fa; margin: 0; padding: 10px; padding-bottom: 100px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* 編輯控制列 */
        .edit-panel { display: flex; gap: 10px; margin-bottom: 12px; }
        .inputs { flex: 2; }
        .styler { flex: 1.2; background: #f9f9f9; padding: 8px; border-radius: 12px; border: 1px solid #eee; }
        label { font-size: 10px; color: #999; font-weight: bold; display: block; margin-bottom: 2px; }
        input, textarea, select { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 6px; outline: none; }

        /* 預覽容器 */
        .viewport { margin: 10px 0; border: 3px solid #00b900; border-radius: 20px; overflow: hidden; position: relative; background: #000; aspect-ratio: 20/13; }
        #croppie-el { width: 100%; height: 100%; }
        #fixed-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .overlay { position: absolute; bottom: 12%; left: 20px; right: 20px; pointer-events: none; z-index: 10; text-shadow: 0 2px 5px rgba(255,255,255,0.9); }
        
        /* 縮圖導覽 */
        .thumb-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .t-box { width: 70px; height: 46px; border-radius: 8px; border: 2px solid #eee; object-fit: cover; cursor: pointer; flex-shrink: 0; transition: 0.2s; position: relative; }
        .t-box.active { border-color: #00b900; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,185,0,0.2); }
        .t-add { width: 70px; height: 46px; border-radius: 8px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 24px; cursor: pointer; flex-shrink: 0; }

        /* 底部按鈕 */
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.98); padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .btn-send { width: 100%; max-width: 400px; background: #00b900; color: white; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-weight:bold; color:#00b900; font-size:18px;">𓃥 白六賀卡·超</span>
        <span id="mode-info" style="font-size:10px; padding:3px 10px; border-radius:12px; background:#eee;"></span>
    </div>

    <div class="edit-panel">
        <div class="inputs">
            <label>收件人 (To)</label>
            <input type="text" id="edit-to" placeholder="收件人..." oninput="syncData('to')">
            <label>祝福語 (Message)</label>
            <textarea id="edit-msg" rows="2" placeholder="祝你有個美好的一天！" oninput="syncData('msg')"></textarea>
        </div>
        <div class="styler">
            <label>字體大小</label>
            <select id="edit-ts" onchange="syncData('ts')">
                <option value="md">中</option>
                <option value="lg">大</option>
                <option value="xl" selected>特大</option>
            </select>
            <label>文字顏色</label>
            <input type="color" id="edit-tc" value="#333333" onchange="syncData('tc')">
        </div>
    </div>

    <div class="viewport">
        <div id="croppie-el"></div>
        <img id="fixed-img">
        <div class="overlay">
            <span id="p-to" style="display:block; font-weight:bold;">To: 朋友</span>
            <span id="p-msg" style="display:block;">祝你有個美好的一天！</span>
        </div>
    </div>

    <div class="thumb-nav" id="thumb-list">
        <div class="t-add" onclick="document.getElementById('file-in').click()">+</div>
        <input type="file" id="file-in" hidden accept="image/*" onchange="handleFile(this)">
    </div>
</div>

<div class="actions">
    <button id="mainBtn" class="btn-send" onclick="sendCarousel()">🚀 發送批次賀卡組合</button>
    <div id="status-hint" style="font-size:10px; color:#bbb; margin-top:8px;">支援多圖裁切與快速轉傳</div>
</div>

<script>
    const LIFF_ID = '2009222789-bvdxbeSL';
    const CLOUD_NAME = 'dnwwaush7';
    const UPLOAD_PRESET = 'ml_default';
    
    let croppieInst;
    let isForward = false;
    let cardSet = []; 
    let currentIdx = 0;

    const initialDefault = 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg';

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        const params = new URLSearchParams(window.location.search);
        
        if (params.has('data')) {
            isForward = true;
            document.getElementById('mode-info').innerText = "快速轉傳";
            document.getElementById('croppie-el').style.display = 'none';
            document.getElementById('fixed-img').style.display = 'block';
            cardSet = JSON.parse(decodeURIComponent(params.get('data')));
        } else {
            isForward = false;
            document.getElementById('mode-info').innerText = "全新製作";
            initCroppie();
            // 初始第一張
            cardSet = [{ img: initialDefault, to: '', msg: '', ts: 'xl', tc: '#333333', isSynced: true }];
        }
        renderThumbs();
        loadCard(0);
    }

    function initCroppie() {
        croppieInst = new Croppie(document.getElementById('croppie-el'), {
            viewport: { width: 300, height: 195, type: 'square' },
            boundary: { width: '100%', height: '100%' },
            showZoomer: false
        });
    }

    function renderThumbs() {
        const list = document.getElementById('thumb-list');
        list.querySelectorAll('.t-box').forEach(e => e.remove());
        cardSet.forEach((c, i) => {
            const img = document.createElement('img');
            img.className = `t-box ${i === currentIdx ? 'active' : ''}`;
            img.src = c.img;
            img.onclick = () => switchTab(i);
            list.insertBefore(img, list.querySelector('.t-add'));
        });
        list.querySelector('.t-add').style.display = (isForward || cardSet.length >= 10) ? 'none' : 'flex';
    }

    async function switchTab(idx) {
        if (!isForward) {
            // 切換前存下當前裁切結果
            const blob = await croppieInst.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
            cardSet[currentIdx].blob = blob;
            cardSet[currentIdx].img = URL.createObjectURL(blob);
        }
        currentIdx = idx;
        renderThumbs();
        loadCard(idx);
    }

    function loadCard(idx) {
        const c = cardSet[idx];
        document.getElementById('edit-to').value = c.to;
        document.getElementById('edit-msg').value = c.msg;
        document.getElementById('edit-ts').value = c.ts;
        document.getElementById('edit-tc').value = c.tc;
        
        if (isForward) {
            document.getElementById('fixed-img').src = c.img;
        } else {
            croppieInst.bind({ url: c.img });
        }
        updateUI();
    }

    function syncData(field) {
        const val = document.getElementById(`edit-${field}`).value;
        cardSet[currentIdx][field] = val;

        // 如果是改第一張，連動後面
        if (currentIdx === 0) {
            for (let i = 1; i < cardSet.length; i++) {
                if (cardSet[i].isSynced) {
                    cardSet[i][field] = val;
                }
            }
        } else {
            cardSet[currentIdx].isSynced = false;
        }
        updateUI();
    }

    function updateUI() {
        const c = cardSet[currentIdx];
        const t = document.getElementById('p-to');
        const m = document.getElementById('p-msg');
        
        t.innerText = "To: " + (c.to || "朋友");
        t.style.color = c.tc;
        t.style.fontSize = { md:'16px', lg:'20px', xl:'24px' }[c.ts];
        
        m.innerText = c.msg || "祝你有個美好的一天！";
        m.style.color = c.tc;
        m.style.fontSize = { md:'14px', lg:'16px', xl:'18px' }[c.ts === 'xl' ? 'md' : 'sm']; // 賀詞稍小一點
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                // 如果是在第一張圖且還沒新增過其他圖，直接更換首圖
                if (currentIdx === 0 && cardSet.length === 1 && cardSet[0].img === initialDefault) {
                    cardSet[0].img = e.target.result;
                    croppieInst.bind({ url: e.target.result });
                    renderThumbs();
                } else {
                    // 否則新增一張
                    cardSet.push({ 
                        img: e.target.result, 
                        to: cardSet[0].to, 
                        msg: cardSet[0].msg, 
                        ts: cardSet[0].ts, 
                        tc: cardSet[0].tc, 
                        isSynced: true 
                    });
                    switchTab(cardSet.length - 1);
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function sendCarousel() {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        document.getElementById('status-hint').innerText = "🚀 正在努力上傳照片...";

        try {
            if (!isForward) {
                // 最後一張也要裁切
                const lastBlob = await croppieInst.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
                cardSet[currentIdx].blob = lastBlob;

                for (let i = 0; i < cardSet.length; i++) {
                    const fd = new FormData();
                    fd.append('file', cardSet[i].blob || cardSet[i].img);
                    fd.append('upload_preset', UPLOAD_PRESET);
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                    const d = await res.json();
                    cardSet[i].img = d.secure_url;
                    delete cardSet[i].blob;
                }
            }

            const rawData = cardSet.map(c => ({ img: c.img, to: c.to, msg: c.msg, ts: c.ts, tc: c.tc }));
            const shareUrl = `https://liff.line.me/${LIFF_ID}?data=${encodeURIComponent(JSON.stringify(rawData))}`;

            const bubbles = rawData.map((c, i) => ({
                "type": "bubble",
                "size": "mega",
                "hero": { "type": "image", "url": c.img, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": `𓃥 白六賀卡·超 (${i+1}/${rawData.length})`, "weight": "bold", "color": "#00b900", "size": "xs" },
                        { "type": "text", "text": "To: " + (c.to || "朋友"), "weight": "bold", "size": c.ts, "color": c.tc, "margin": "md" },
                        { "type": "text", "text": c.msg || "祝你有個美好的一天！", "wrap": true, "margin": "sm", "size": "md", "color": c.tc }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "height": "sm", "action": { "type": "uri", "label": "快速轉傳", "uri": shareUrl } },
                        { "type": "button", "style": "secondary", "color": "#eeeeee", "height": "sm", "action": { "type": "uri", "label": "重新製作", "uri": `https://liff.line.me/${LIFF_ID}` } }
                    ]
                }
            }));

            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "𓃥 收到一份白六賀卡·超組合！",
                "contents": { "type": "carousel", "contents": bubbles }
            }]);
            liff.closeWindow();
        } catch (e) { alert("發送失敗"); btn.disabled = false; }
    }

    init();
</script>
</body>
</html>
