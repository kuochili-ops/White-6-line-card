<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六賀卡 · 旗艦版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f8f9fa; margin: 0; padding: 12px; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .editor-box { display: flex; gap: 12px; margin-bottom: 15px; background: #fcfcfc; padding: 15px; border-radius: 20px; border: 1px solid #eee; }
        .input-main { flex: 2; }
        .input-style { flex: 1.1; border-left: 3px solid #00b900; padding-left: 12px; }
        label { font-size: 11px; color: #999; font-weight: bold; display: block; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 8px; outline: none; }
        .stage { margin: 15px 0; border: 4px solid #00b900; border-radius: 25px; overflow: hidden; position: relative; background: #000; aspect-ratio: 20/13; }
        #cp-wrap { width: 100%; height: 100%; }
        .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; pointer-events: none; z-index: 10; padding: 30px 20px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%); }
        .p-to { display:block; font-weight:bold; }
        .p-msg { display:block; line-height: 1.4; margin-top: 4px; }
        .btn-upload { width: 100%; padding: 12px; background: #00b900; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; z-index: 900; border-top: 1px solid #eee; }
        .btn-send { width: 100%; background: #00b900; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 19px; font-weight: bold; box-shadow: 0 8px 20px rgba(0,185,0,0.15); }
        .loading-mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:1000; flex-direction:column; justify-content:center; align-items:center; color:#00b900; font-weight:bold; }
    </style>
</head>
<body>

<div id="loader" class="loading-mask">🪄 影像處理中...</div>

<div class="container">
    <div class="editor-box">
        <div class="input-main">
            <label>名字</label>
            <input type="text" id="v-to" placeholder="收件人" oninput="update()" onfocus="setCtx('to')">
            <label>祝福</label>
            <textarea id="v-msg" rows="2" placeholder="內容" oninput="update()" onfocus="setCtx('msg')"></textarea>
            <button id="btn-pic" class="btn-upload" onclick="document.getElementById('f-in').click()">📷 更換照片</button>
            <input type="file" id="f-in" hidden accept="image/*" onchange="handleFile(this)">
        </div>
        <div class="input-style">
            <div id="focus-tag" style="font-size:11px; color:#00b900; margin-bottom:5px; font-weight:900;">編輯姓名</div>
            <label>大小</label>
            <select id="v-size" onchange="update()"><option value="md">中</option><option value="lg">大</option><option value="xl" selected>特大</option></select>
            <label>顏色</label>
            <input type="color" id="v-color" value="#ffffff" onchange="update()">
        </div>
    </div>

    <div class="stage">
        <div id="cp-wrap"></div>
        <div class="overlay-bottom">
            <div id="p-to" class="p-to">名字</div>
            <div id="p-msg" class="p-msg">祝福內容</div>
        </div>
    </div>
</div>

<div class="footer">
    <button id="go" class="btn-send" onclick="send()">🚀 傳送賀卡</button>
</div>

<script>
    // 已更新為您提供的 LIFF ID
    const LIFF_ID = '2009222789-bvdxbeSL', CLOUD_NAME = 'dnwwaush7', UPLOAD_PRESET = 'ml_default';
    let cp, currentCtx = 'to', isLocked = false;
    let card = { to:'', msg:'', toS:'xl', msgS:'md', toC:'#ffffff', msgC:'#ffffff', img: 'https://res.cloudinary.com/dnwwaush7/image/upload/v1742950223/image_l9v1yv.png' };

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            const p = new URLSearchParams(window.location.search);
            
            if (p.get('img')) {
                isLocked = true;
                card = {
                    img: p.get('img'), to: p.get('to')||'', msg: p.get('msg')||'',
                    toS: p.get('toS')||'xl', msgS: p.get('msgS')||'md',
                    toC: p.get('toC')||'#ffffff', msgC: p.get('msgC')||'#ffffff'
                };
                document.getElementById('v-to').value = card.to;
                document.getElementById('v-msg').value = card.msg;
                document.getElementById('btn-pic').style.display = 'none'; 
            }

            cp = new Croppie(document.getElementById('cp-wrap'), {
                viewport: { width: 300, height: 195, type: 'square' },
                boundary: { width: '100%', height: '100%' }, 
                showZoomer: !isLocked, 
                mouseWheelZoom: !isLocked,
                enforceBoundary: !isLocked
            });
            
            const finalSrc = card.img.includes('?') ? `${card.img}&t=${Date.now()}` : `${card.img}?t=${Date.now()}`;
            await cp.bind({ url: finalSrc });
            
            if (isLocked) {
                setTimeout(() => { if(cp) cp.setZoom(0); }, 100);
                document.getElementById('cp-wrap').style.pointerEvents = 'none';
                document.querySelector('.cr-viewport').style.border = 'none';
            }
            updateUI();
        } catch (e) { console.error(e); }
    }

    function setCtx(ctx) { 
        currentCtx = ctx; 
        document.getElementById('focus-tag').innerText = ctx==='to'?'編輯姓名':'編輯內容';
        update(); 
    }
    
    function update() {
        card.to = document.getElementById('v-to').value;
        card.msg = document.getElementById('v-msg').value;
        if (currentCtx === 'to') { 
            card.toS = document.getElementById('v-size').value; 
            card.toC = document.getElementById('v-color').value; 
        } else { 
            card.msgS = document.getElementById('v-size').value; 
            card.msgC = document.getElementById('v-color').value; 
        }
        updateUI();
    }

    function updateUI() {
        const t = document.getElementById('p-to'), m = document.getElementById('p-msg');
        t.innerText = card.to || " "; t.style.color = card.toC;
        t.style.fontSize = { md:'18px', lg:'24px', xl:'30px' }[card.toS];
        m.innerText = card.msg || " "; m.style.color = card.msgC;
        m.style.fontSize = { md:'14px', lg:'18px', xl:'22px' }[card.msgS];
        document.getElementById('v-size').value = currentCtx === 'to' ? card.toS : card.msgS;
        document.getElementById('v-color').value = currentCtx === 'to' ? card.toC : card.msgC;
    }

    function handleFile(input) {
        if (!isLocked && input.files[0]) {
            document.getElementById('loader').style.display = 'flex';
            const r = new FileReader();
            r.onload = e => { 
                cp.bind({ url: e.target.result }); 
                document.getElementById('loader').style.display = 'none';
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    async function send() {
        const b = document.getElementById('go'); b.disabled = true; 
        document.getElementById('loader').style.display = 'flex';
        try {
            let finalUrl = card.img;
            if (!isLocked) {
                const blob = await cp.result({ type: 'blob', size: { width: 1200 }, format: 'jpeg', quality: 0.9 });
                const fd = new FormData(); fd.append('file', blob); fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const d = await res.json();
                finalUrl = d.secure_url;
            }

            const shareUrl = `https://liff.me/${LIFF_ID}/?img=${encodeURIComponent(finalUrl)}&to=${encodeURIComponent(card.to)}&msg=${encodeURIComponent(card.msg)}&toS=${card.toS}&msgS=${card.msgS}&toC=${encodeURIComponent(card.toC)}&msgC=${encodeURIComponent(card.msgC)}`;

            await liff.shareTargetPicker([{
                "type": "flex", "altText": "🎁 收到白六賀卡！",
                "contents": {
                    "type": "bubble", "size": "mega",
                    "body": {
                        "type": "box", "layout": "vertical", "paddingAll": "0px",
                        "contents": [
                            { "type": "image", "url": finalUrl, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                            {
                                "type": "box", "layout": "horizontal", "position": "absolute", "offsetTop": "0px", "height": "33.3%", "offsetStart": "0px", "offsetEnd": "0px",
                                "contents": [
                                    { "type": "button", "action": { "type": "uri", "label": " ", "uri": `https://liff.line.me/${LIFF_ID}` } },
                                    { "type": "button", "action": { "type": "uri", "label": " ", "uri": shareUrl } }
                                ]
                            },
                            {
                                "type": "box", "layout": "vertical", "position": "absolute", "offsetBottom": "0px", "offsetStart": "0px", "offsetEnd": "0px", "paddingAll": "20px",
                                "background": { "type": "linearGradient", "angle": "0deg", "startColor": "#000000cc", "endColor": "#00000000" },
                                "contents": [
                                    { "type": "text", "text": card.to || " ", "weight": "bold", "size": card.toS, "color": card.toC },
                                    { "type": "text", "text": card.msg || " ", "wrap": true, "size": card.msgS==='xl'?'lg':card.msgS, "color": card.msgC, "margin": "sm" }
                                ]
                            }
                        ]
                    }
                }
            }]);
            liff.closeWindow();
        } catch (e) { b.disabled = false; document.getElementById('loader').style.display = 'none'; alert(e.message); }
    }
    window.onload = init;
</script>
</body>
</html>
