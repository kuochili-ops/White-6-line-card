<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六賀卡·旗艦版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f2f4f7; margin: 0; padding: 10px; padding-bottom: 120px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .editor-box { display: flex; gap: 10px; margin-bottom: 12px; background: #fafafa; padding: 12px; border-radius: 20px; border: 1px solid #eee; }
        .input-main { flex: 2; }
        .input-style { flex: 1.1; border-left: 2.5px solid #00b900; padding-left: 10px; }
        label { font-size: 10px; color: #bbb; font-weight: bold; display: block; margin-bottom: 2px; }
        input, textarea, select { width: 100%; padding: 7px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 5px; outline: none; }
        .stage { margin: 10px 0; border: 4px solid #00b900; border-radius: 22px; overflow: hidden; position: relative; background: #000; aspect-ratio: 20/13; }
        #cp-wrap { width: 100%; height: 100%; }
        .overlay { position: absolute; bottom: 12%; left: 20px; right: 20px; pointer-events: none; z-index: 10; text-shadow: 0 2px 8px rgba(255,255,255,0.8); }
        .btn-upload { width: 100%; padding: 12px; background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; color: #666; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; text-align: center; z-index: 900; border-top: 1px solid #eee; }
        .btn-send { width: 100%; max-width: 450px; background: #00b900; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 19px; font-weight: bold; }
        .thumb-list { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 5px; }
        .thumb { width: 60px; height: 40px; border-radius: 6px; border: 2px solid #ddd; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        .thumb.active { border-color: #00b900; box-shadow: 0 0 5px rgba(0,185,0,0.5); }
        .loading-mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:1000; justify-content:center; align-items:center; font-weight:bold; color:#00b900; }
        .locked { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="loader" class="loading-mask">🪄 圖片處理中...</div>

<div class="container">
    <div style="padding:5px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; color:#00b900;">𓃥 白六賀卡·旗艦版</span>
        <span id="pic-count" style="font-size:12px; color:#aaa;">1 / 1</span>
    </div>

    <div class="thumb-list" id="thumb-container"></div>

    <div class="editor-box">
        <div class="input-main">
            <label>姓名</label>
            <input type="text" id="v-to" placeholder="名字" oninput="update()" onfocus="setCtx('to')">
            <label>祝福</label>
            <textarea id="v-msg" rows="2" placeholder="內容" oninput="update()" onfocus="setCtx('msg')"></textarea>
            <button id="btn-up" class="btn-upload" onclick="document.getElementById('f-in').click()">📷 新增照片 (自動瘦身)</button>
            <input type="file" id="f-in" hidden accept="image/*" onchange="handleFile(this)">
        </div>
        <div class="input-style">
            <div id="focus-tag" style="font-size:11px; color:#00b900; margin-bottom:5px; font-weight:900;">設定姓名</div>
            <label>字體大小</label>
            <select id="v-size" onchange="update()"><option value="md">中</option><option value="lg">大</option><option value="xl" selected>特大</option></select>
            <label>顏色</label>
            <input type="color" id="v-color" value="#333333" onchange="update()">
        </div>
    </div>

    <div class="stage">
        <div id="cp-wrap"></div>
        <div class="overlay">
            <span id="p-to" style="display:block; font-weight:bold;">名字</span>
            <span id="p-msg" style="display:block;">祝福內容</span>
        </div>
    </div>
</div>

<div class="footer"><button id="go" class="btn-send" onclick="send()">🚀 傳送賀卡</button></div>

<script>
    const LIFF_ID = '2009222789-bvdxbeSL', CLOUD_NAME = 'dnwwaush7', UPLOAD_PRESET = 'ml_default';
    let cp, activeIdx = 0, currentCtx = 'to', isLocked = false;
    let items = [{ to:'', msg:'', toS:'xl', msgS:'md', toC:'#333333', msgC:'#333333', img: 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg' }];

    async function init() {
        if (!window.liff) { setTimeout(init, 500); return; }
        try {
            await liff.init({ liffId: LIFF_ID });
            const p = new URLSearchParams(window.location.search);
            const rawImgs = p.get('imgs');
            
            if (rawImgs) {
                isLocked = true;
                const imgUrls = JSON.parse(decodeURIComponent(rawImgs));
                items = imgUrls.map(url => ({
                    to: p.get('to')||'', msg: p.get('msg')||'', 
                    toS: p.get('toS')||'xl', msgS: p.get('msgS')||'md', 
                    toC: p.get('toC')||'#333333', msgC: p.get('msgC')||'#333333', img: url
                }));
                document.getElementById('btn-up').innerText = "🔒 轉傳模式 (圖片已固定)";
                document.getElementById('btn-up').classList.add('locked');
                document.getElementById('v-to').value = items[0].to;
                document.getElementById('v-msg').value = items[0].msg;
            }
            
            setupCroppie();
            renderThumbs();
        } catch (e) { console.error("LIFF Init Error", e); }
    }

    function setupCroppie() {
        if(cp) cp.destroy();
        cp = new Croppie(document.getElementById('cp-wrap'), {
            viewport: { width: 300, height: 195, type: 'square' },
            boundary: { width: '100%', height: '100%' }, 
            showZoomer: !isLocked 
        });
        cp.bind({ url: items[activeIdx].img });
        updateUI();
    }

    function renderThumbs() {
        const container = document.getElementById('thumb-container');
        container.innerHTML = items.map((it, i) => `<img src="${it.img}" class="thumb ${i===activeIdx?'active':''}" onclick="switchItem(${i})">`).join('');
        document.getElementById('pic-count').innerText = `${activeIdx + 1} / ${items.length}`;
    }

    async function switchItem(idx) {
        if (!isLocked) {
            items[activeIdx].img = await cp.result({ type: 'base64', size: 'viewport' });
        }
        activeIdx = idx;
        const it = items[idx];
        document.getElementById('v-to').value = it.to;
        document.getElementById('v-msg').value = it.msg;
        renderThumbs();
        setupCroppie();
    }

    async function handleFile(input) {
        if (isLocked || !input.files[0]) return;
        document.getElementById('loader').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                let w = img.width, h = img.height, max = 1280;
                if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                cvs.width = w; cvs.height = h;
                cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                const slim = cvs.toDataURL('image/jpeg', 0.8);
                
                if (items.length < 10) {
                    items.push({ ...items[activeIdx], img: slim });
                    activeIdx = items.length - 1;
                } else {
                    items[activeIdx].img = slim;
                    alert("最多支援 10 張照片，已替換目前照片");
                }
                renderThumbs();
                setupCroppie();
                document.getElementById('loader').style.display = 'none';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function setCtx(ctx) { currentCtx = ctx; update(); }

    function update() {
        const it = items[activeIdx];
        it.to = document.getElementById('v-to').value;
        it.msg = document.getElementById('v-msg').value;
        if (currentCtx === 'to') { 
            it.toS = document.getElementById('v-size').value; 
            it.toC = document.getElementById('v-color').value; 
            document.getElementById('focus-tag').innerText = '設定姓名';
        } else { 
            it.msgS = document.getElementById('v-size').value; 
            it.msgC = document.getElementById('v-color').value; 
            document.getElementById('focus-tag').innerText = '設定留言';
        }
        updateUI();
    }

    function updateUI() {
        const it = items[activeIdx];
        const t = document.getElementById('p-to'), m = document.getElementById('p-msg');
        t.innerText = it.to || "名字"; t.style.color = it.toC; t.style.fontSize = {md:'18px',lg:'24px',xl:'30px'}[it.toS];
        m.innerText = it.msg || "祝福內容"; m.style.color = it.msgC; m.style.fontSize = {md:'14px',lg:'18px',xl:'22px'}[it.msgS];
    }

    async function send() {
        const b = document.getElementById('go'); b.disabled = true; b.innerText = "🚀 上傳中...";
        try {
            const finalImgs = [];
            for (let i=0; i<items.length; i++) {
                if (isLocked) {
                    finalImgs.push(items[i].img);
                } else {
                    // 切換並獲取最後編輯狀態
                    await switchItem(i);
                    const blob = await cp.result({ type: 'blob', size: { width: 800 }, format: 'jpeg', quality: 0.75 });
                    const fd = new FormData();
                    fd.append('file', blob); fd.append('upload_preset', UPLOAD_PRESET);
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                    const d = await res.json();
                    finalImgs.push(d.secure_url);
                }
            }

            // 以第一張的設定作為轉傳參數的預設值
            const f = items[0];
            const shareUrl = `https://liff.line.me/${LIFF_ID}/?imgs=${encodeURIComponent(JSON.stringify(finalImgs))}&to=${encodeURIComponent(f.to)}&msg=${encodeURIComponent(f.msg)}&toS=${f.toS}&msgS=${f.msgS}&toC=${encodeURIComponent(f.toC)}&msgC=${encodeURIComponent(f.msgC)}`;

            const bubbles = finalImgs.map((url, i) => ({
                "type": "bubble", "size": "mega",
                "body": {
                    "type": "box", "layout": "vertical", "paddingAll": "0px",
                    "contents": [
                        { "type": "image", "url": url, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                        {
                            "type": "box", "layout": "vertical", "position": "absolute", "offsetBottom": "0px", "offsetStart": "0px", "offsetEnd": "0px", "paddingAll": "20px",
                            "background": { "type": "linearGradient", "angle": "0deg", "startColor": "#000000aa", "endColor": "#00000000" },
                            "contents": [
                                { "type": "text", "text": items[i].to || "親愛的朋友", "weight": "bold", "size": items[i].toS, "color": items[i].toC },
                                { "type": "text", "text": items[i].msg || "祝你有個美好的一天！", "wrap": true, "size": items[i].msgS==='xl'?'lg':items[i].msgS, "color": items[i].msgC, "margin": "sm" }
                            ]
                        }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "md", "contents": [
                        { "type": "button", "style": "secondary", "height": "sm", "color": "#eeeeee", "action": { "type": "uri", "label": "我也要送", "uri": `https://liff.line.me/${LIFF_ID}` } },
                        { "type": "button", "style": "primary", "height": "sm", "color": "#00b900", "action": { "type": "uri", "label": "快速轉傳", "uri": shareUrl } }
                    ]
                }
            }));

            await liff.shareTargetPicker([{ "type": "flex", "altText": "收到一組白六賀卡！", "contents": { "type": "carousel", "contents": bubbles } }]);
            liff.closeWindow();
        } catch (e) { b.disabled = false; b.innerText = "🚀 傳送賀卡"; alert(e.message); }
    }
    window.onload = init;
</script>
</body>
</html>
