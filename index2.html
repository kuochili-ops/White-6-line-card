<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六賀卡 Carousel</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f8f9fa; margin: 0; padding: 10px; padding-bottom: 90px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* 模式標籤 */
        .mode-hint { font-size: 11px; font-weight: bold; text-align: center; padding: 6px; border-radius: 12px; margin-bottom: 12px; letter-spacing: 1px; }

        /* 輸入區域 */
        .input-section { display: flex; gap: 10px; margin-bottom: 12px; }
        .left-fields { flex: 2; }
        .right-format { flex: 1.1; background: #f1f8f1; padding: 10px; border-radius: 15px; border: 1px solid #e2eee2; }
        label { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 4px; display: block; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 8px; outline: none; }
        input:focus, textarea:focus { border-color: #00b900; background: #fff; }

        /* 預覽與裁切 */
        .preview-container { margin: 10px 0; border: 3px solid #00b900; border-radius: 20px; overflow: hidden; position: relative; background: #000; aspect-ratio: 20/13; }
        #upload-demo { width: 100%; height: 100%; }
        #static-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .text-overlay { position: absolute; bottom: 15%; left: 20px; right: 20px; pointer-events: none; z-index: 10; text-shadow: 0 2px 5px rgba(255,255,255,0.9); line-height: 1.3; }
        #p-brand { font-size: 11px; color: #00b900; font-weight: bold; }

        /* Carousel 管理器 */
        .carousel-manager { margin-top: 15px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .thumb-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .thumb-item { width: 70px; height: 46px; border-radius: 8px; border: 2px solid #eee; object-fit: cover; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .thumb-item.active { border-color: #00b900; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,185,0,0.2); }
        .thumb-add { width: 70px; height: 46px; border-radius: 8px; border: 2px dashed #ccc; background: #fafafa; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 24px; cursor: pointer; flex-shrink: 0; }

        /* 底部操作 */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 12px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .btn-main { width: 100%; max-width: 400px; background: #00b900; color: white; padding: 15px; border: none; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        #status { font-size: 10px; color: #aaa; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-hint" class="mode-hint"></div>

    <div class="input-section">
        <div class="left-fields">
            <label>收件人</label>
            <input type="text" id="targetName" placeholder="點此輸入姓名..." onfocus="setCurrentFocus('targetName')" oninput="syncData()">
            <label>祝福語</label>
            <textarea id="message" rows="2" placeholder="想說的話..." onfocus="setCurrentFocus('message')" oninput="syncData()"></textarea>
        </div>
        <div class="right-format">
            <label>字體大小</label>
            <select id="fontSize" onchange="syncFormat()">
                <option value="sm">小</option><option value="md">中</option><option value="lg">大</option><option value="xl" selected>特大</option>
            </select>
            <label>顏色</label>
            <select id="fontColor" onchange="syncFormat()">
                <option value="#333333">酷黑</option><option value="#00b900">品牌綠</option><option value="#ff4b4b">熱情紅</option><option value="#4b77ff">沉穩藍</option>
            </select>
        </div>
    </div>

    <div class="preview-container">
        <div id="upload-demo"></div>
        <img id="static-img" src="">
        <div class="text-overlay">
            <span id="p-brand">𓃥 白六賀卡</span>
            <span id="p-name">To: 朋友</span>
            <span id="p-msg">祝你有個美好的一天！</span>
        </div>
    </div>

    <div class="carousel-manager">
        <label>分頁管理 (最多 10 張)</label>
        <div id="thumb-list" class="thumb-list">
            <div class="thumb-add" id="add-btn" onclick="triggerUpload()">+</div>
        </div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile(this)">
    </div>
</div>

<div class="footer-bar">
    <button id="sendBtn" class="btn-main" onclick="executeBatchSend()">🚀 預覽並批次傳送</button>
    <div id="status">𓃥 系統就緒</div>
</div>

<script>
    const LIFF_ID = '2009222789-bvdxbeSL';
    const CLOUD_NAME = 'dnwwaush7';
    const UPLOAD_PRESET = 'ml_default';
    
    let croppieInstance;
    let isForwardMode = false;
    let currentFocusField = 'targetName';
    let cardSet = []; // 存放所有 Bubble 數據
    let activeIdx = 0;

    const defaultImg = 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg';

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            
            const params = new URLSearchParams(window.location.search);
            if (params.has('data')) {
                // --- 轉傳模式 ---
                isForwardMode = true;
                document.getElementById('mode-hint').innerText = "🔗 快速轉傳模式 (圖片已固定)";
                document.getElementById('mode-hint').style.background = "#fff3e0";
                document.getElementById('mode-hint').style.color = "#ef6c00";
                document.getElementById('upload-demo').style.display = 'none';
                document.getElementById('static-img').style.display = 'block';
                cardSet = JSON.parse(decodeURIComponent(params.get('data')));
            } else {
                // --- 製作模式 ---
                document.getElementById('mode-hint').innerText = "🆕 全新製作模式 (Carousel)";
                document.getElementById('mode-hint').style.background = "#e3f2fd";
                document.getElementById('mode-hint').style.color = "#1976d2";
                croppieInstance = new Croppie(document.getElementById('upload-demo'), {
                    viewport: { width: 300, height: 195, type: 'square' },
                    boundary: { width: '100%', height: '100%' },
                    showZoomer: false
                });
                cardSet = [{ img: defaultImg, to: '', msg: '', ts: 'xl', tc: '#333333', ms: 'md', mc: '#333333' }];
            }
            renderThumbs();
            loadCard(0);
        } catch (e) { console.error(e); }
    }

    function renderThumbs() {
        const list = document.getElementById('thumb-list');
        list.querySelectorAll('.thumb-item').forEach(el => el.remove());
        cardSet.forEach((card, i) => {
            const img = document.createElement('img');
            img.className = `thumb-item ${i === activeIdx ? 'active' : ''}`;
            img.src = card.img;
            img.onclick = () => switchCard(i);
            list.insertBefore(img, document.getElementById('add-btn'));
        });
        document.getElementById('add-btn').style.display = (isForwardMode || cardSet.length >= 10) ? 'none' : 'flex';
    }

    async function switchCard(i) {
        if (!isForwardMode && croppieInstance) {
            // 切換前，先把目前的裁切結果存入記憶體
            const blob = await croppieInstance.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
            cardSet[activeIdx].blob = blob;
            cardSet[activeIdx].img = URL.createObjectURL(blob); 
        }
        activeIdx = i;
        renderThumbs();
        loadCard(i);
    }

    function loadCard(i) {
        const c = cardSet[i];
        document.getElementById('targetName').value = c.to;
        document.getElementById('message').value = c.msg;
        document.getElementById('fontSize').value = (currentFocusField === 'targetName') ? c.ts : c.ms;
        document.getElementById('fontColor').value = (currentFocusField === 'targetName') ? c.tc : c.mc;
        
        if (isForwardMode) {
            document.getElementById('static-img').src = c.img;
        } else {
            croppieInstance.bind({ url: c.img });
        }
        updatePreviewText();
    }

    function syncData() {
        cardSet[activeIdx].to = document.getElementById('targetName').value;
        cardSet[activeIdx].msg = document.getElementById('message').value;
        updatePreviewText();
    }

    function syncFormat() {
        const val = document.getElementById('fontSize').value;
        const col = document.getElementById('fontColor').value;
        if (currentFocusField === 'targetName') {
            cardSet[activeIdx].ts = val; cardSet[activeIdx].tc = col;
        } else {
            cardSet[activeIdx].ms = val; cardSet[activeIdx].mc = col;
        }
        updatePreviewText();
    }

    function updatePreviewText() {
        const n = document.getElementById('p-name');
        const m = document.getElementById('p-msg');
        const c = cardSet[activeIdx];
        n.innerText = "To: " + (c.to || "朋友");
        n.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[c.ts];
        n.style.color = c.tc;
        m.innerText = c.msg || "祝你有個美好的一天！";
        m.style.fontSize = { sm:'13px', md:'16px', lg:'20px', xl:'24px' }[c.ms];
        m.style.color = c.mc;
    }

    function setCurrentFocus(f) {
        currentFocusField = f;
        const c = cardSet[activeIdx];
        document.getElementById('fontSize').value = (f === 'targetName') ? c.ts : c.ms;
        document.getElementById('fontColor').value = (f === 'targetName') ? c.tc : c.mc;
    }

    function triggerUpload() { document.getElementById('file-input').click(); }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                cardSet.push({ img: e.target.result, to: '', msg: '', ts: 'xl', tc: '#333333', ms: 'md', mc: '#333333' });
                activeIdx = cardSet.length - 1;
                renderThumbs();
                loadCard(activeIdx);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function executeBatchSend() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        document.getElementById('status').innerText = "🚀 正在處理中...";

        try {
            // 1. 最後一張圖裁切
            if (!isForwardMode) {
                const blob = await croppieInstance.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
                cardSet[activeIdx].blob = blob;
            }

            // 2. 批次上傳 (如果是製作模式)
            if (!isForwardMode) {
                const uploads = cardSet.map(async (c) => {
                    const fd = new FormData();
                    fd.append('file', c.blob || c.img);
                    fd.append('upload_preset', UPLOAD_PRESET);
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                    const d = await res.json();
                    c.img = d.secure_url;
                    delete c.blob; // 清除暫存
                });
                await Promise.all(uploads);
            }

            // 3. 封裝數據發送 Flex
            const dataStr = encodeURIComponent(JSON.stringify(cardSet));
            const forwardUrl = `https://liff.line.me/${LIFF_ID}?data=${dataStr}`;
            const resetUrl = `https://liff.line.me/${LIFF_ID}`;

            const bubbles = cardSet.map(c => ({
                "type": "bubble",
                "hero": { "type": "image", "url": c.img, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                        { "type": "text", "text": "To: " + (c.to || "朋友"), "weight": "bold", "size": c.ts, "color": c.tc, "margin": "sm" },
                        { "type": "text", "text": c.msg || "祝你有個美好的一天！", "wrap": true, "margin": "lg", "size": c.ms, "color": c.mc }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "height": "sm", "action": { "type": "uri", "label": "快速轉傳", "uri": forwardUrl } },
                        { "type": "button", "style": "secondary", "color": "#eeeeee", "height": "sm", "action": { "type": "uri", "label": "重新製作", "uri": resetUrl } }
                    ]
                }
            }));

            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "𓃥 您收到一份白六賀卡組合！",
                "contents": { "type": "carousel", "contents": bubbles }
            }]);
            liff.closeWindow();
        } catch (e) { 
            alert("傳送失敗，請重試"); 
            btn.disabled = false; 
            document.getElementById('status').innerText = "𓃥 準備就緒";
        }
    }

    init();
</script>

</body>
</html>
